<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <title>Order Produk Sekarang</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f6f7fb;
            color: #111827;
            padding: 24px;
        }
        .imfow-public-wrap {
            width: 100%;
            max-width: 560px;
            margin: 0 auto;
        }
        .imfow-public-card {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 24px;
            padding: 28px;
            box-shadow: 0 20px 55px rgba(15,23,42,.10);
        }
        .imfow-badge {
            display: inline-flex;
            padding: 7px 12px;
            border-radius: 999px;
            background: #fce7f3;
            color: #db2777;
            font-size: 12px;
            font-weight: 900;
            margin-bottom: 14px;
        }
        h1 {
            margin: 0 0 10px;
            font-size: 30px;
            line-height: 1.15;
            letter-spacing: -0.04em;
        }
        p {
            margin: 0 0 20px;
            color: #64748b;
            line-height: 1.6;
        }
        .imfow-product {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 18px;
            padding: 16px;
            margin-bottom: 20px;
        }
        .imfow-product-name {
            font-weight: 900;
            margin-bottom: 4px;
        }
        .imfow-product-price {
            font-size: 24px;
            font-weight: 900;
            color: #db2777;
        }
        .imfow-field {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 7px;
            font-size: 13px;
            font-weight: 900;
            color: #374151;
        }
        input, textarea {
            width: 100%;
            border: 1px solid #d1d5db;
            border-radius: 14px;
            padding: 13px 15px;
            font-size: 14px;
            outline: none;
            font-family: inherit;
        }
        input:focus, textarea:focus {
            border-color: #f43f7f;
            box-shadow: 0 0 0 4px rgba(244,63,127,.12);
        }
        button {
            width: 100%;
            border: 0;
            border-radius: 14px;
            padding: 15px 18px;
            background: linear-gradient(135deg, #f43f7f, #7c3aed);
            color: #fff;
            font-weight: 900;
            font-size: 15px;
            cursor: pointer;
            box-shadow: 0 14px 28px rgba(244,63,127,.24);
        }
        button:disabled {
            opacity: .65;
            cursor: not-allowed;
        }
        .imfow-alert {
            display: none;
            margin-top: 16px;
            padding: 13px 15px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 800;
            line-height: 1.5;
        }
        .imfow-alert-success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
        }
        .imfow-alert-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }
    </style>
</head>
<body>

<div class="imfow-public-wrap">
    <div class="imfow-public-card">
        <span class="imfow-badge">Powered by iMersFOW</span>
        <h1>Order Produk Sekarang</h1>
        <p>Isi data Anda melalui form di bawah ini. Tim kami akan segera menghubungi Anda via WhatsApp.</p>

        <div class="imfow-product">
            <div class="imfow-product-name">Produk Digital Premium</div>
            <div class="imfow-product-price">Rp 99.000</div>
        </div>

        <form id="imfowForm">
            <input type="hidden" name="form_key" value="otomatis-setelah-disimpan">
            <input type="hidden" name="product_name" value="Produk Digital Premium">
            <input type="hidden" name="total_tagihan" value="99000">

            <div class="imfow-field">
                <label>Nama Lengkap</label>
                <input type="text" name="name" required placeholder="Nama Anda">
            </div>

            <div class="imfow-field">
                <label>Nomor WhatsApp</label>
                <input type="tel" name="phone" required placeholder="08xxxxxxxxxx">
            </div>
            <div class="imfow-field">
                <label>Email</label>
                <input type="email" name="email" placeholder="email@domain.com">
            </div>

            <button type="submit" id="imfowSubmit">Kirim Order</button>

            <div id="imfowSuccess" class="imfow-alert imfow-alert-success">Terima kasih. Data Anda berhasil dikirim.</div>
            <div id="imfowError" class="imfow-alert imfow-alert-error"></div>
        </form>
    </div>
</div>

<script>
(function(){
    const form = document.getElementById("imfowForm");
    const button = document.getElementById("imfowSubmit");
    const successBox = document.getElementById("imfowSuccess");
    const errorBox = document.getElementById("imfowError");

    form.addEventListener("submit", async function(e){
        e.preventDefault();

        successBox.style.display = "none";
        errorBox.style.display = "none";
        errorBox.innerHTML = "";

        button.disabled = true;
        button.innerHTML = "Mengirim...";

        const formData = new FormData(form);
        const payload = {};

        formData.forEach(function(value, key){
            payload[key] = value;
        });

        try {
            const response = await fetch("https://imersfow.onemember.web.id/api/index.php?action=submit", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            });

            const result = await response.json();

            if (!result.success) {
                throw new Error(result.message || "Gagal mengirim data.");
            }

            successBox.style.display = "block";
            form.reset();

            const redirectUrl = "";

            if (redirectUrl !== "") {
                setTimeout(function(){
                    window.location.href = redirectUrl;
                }, 900);
            }
        } catch (err) {
            errorBox.innerHTML = err.message || "Terjadi kesalahan.";
            errorBox.style.display = "block";
        } finally {
            button.disabled = false;
            button.innerHTML = "Kirim Order";
        }
    });
})();
</script>

</body>
</html>
