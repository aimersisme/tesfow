

<style>
.im-wrapper { 
    font-family: 'Inter', sans-serif; 
    background: #fff; 
    border-radius: 24px; 
    box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); 
    overflow: hidden; 
    max-width: 450px; 
    margin: 0 auto; 
    border: 1px solid #e2e8f0; 
    width: 100%; 
    box-sizing: border-box; 
} 
.im-header { 
    padding: 24px; 
    text-align: center; 
    color: white; 
    transition: background 0.3s ease; 
} 
.im-logo { 
    max-height: 48px; 
    margin: 0 auto 12px auto; 
    display: block; 
    object-fit: contain; 
} 
.im-title { 
    margin: 0; 
    font-size: 20px; 
    font-weight: 700; 
    line-height: 1.3; 
} 
.im-body {

} 
.im-group { 
    margin-bottom: 16px; 
} 
.im-label { 
    display: block; 
    font-size: 13px; 
    font-weight: 700; 
    color: #475569; 
    margin-bottom: 6px; 
} 
.im-input { 
    width: 100%; 
    padding: 12px 16px; 
    background: #f8fafc; 
    border: 1px solid #cbd5e1; 
    border-radius: 12px; 
    font-size: 14px; 
    box-sizing: border-box; 
    transition: all 0.2s; 
    color: #0f172a; 
} 
.im-input:focus { 
    outline: none; 
    border-color: #60a5fa; 
    box-shadow: 0 0 0 3px rgba(96, 165, 250,0.1); 
    background: #fff; 
} 
.im-radio-group, .im-checkbox-group { 
    display: flex; 
    flex-direction: column; 
    gap: 8px; 
    margin-top: 8px; 
} 
.im-radio-label, .im-checkbox-label { 
    display: flex; 
    align-items: center; 
    gap: 10px; 
    font-size: 14px; 
    color: #334155; 
    cursor: pointer; 
    padding: 8px 12px; 
    background: #f8fafc; 
    border: 1px solid #e2e8f0; 
    border-radius: 10px; 
    transition: background 0.2s; 
} 
.im-radio-label:hover, .im-checkbox-label:hover { 
    background: #f1f5f9; 
} 
.im-radio-label input, .im-checkbox-label input { 
    accent-color: #60a5fa; 
    width: 16px; 
    height: 16px; 
    cursor: pointer; 
} 
.im-footer { 
    margin-top: 24px; 
} 
.im-total-box { 
    display: none; 
    justify-content: space-between; 
    align-items: center; 
    padding: 16px; 
    background: #f8fafc; 
    border: 2px dashed #cbd5e1; 
    border-radius: 12px; 
    margin-bottom: 16px; 
} 
.im-total-label { 
    font-size: 13px; 
    font-weight: 700; 
    color: #475569; 
} 
.im-total-value { 
    font-size: 18px; 
    font-weight: 800; 
    color: #60a5fa; 
} 
.im-trust { 
    display: flex; 
    gap: 12px; 
    padding: 12px 16px; 
    background: rgba(96, 165, 250, 0.08); 
    border: 1px solid rgba(96, 165, 250, 0.2); 
    border-radius: 12px; 
    margin-bottom: 16px; 
    align-items: flex-start; 
} 
.im-trust-title { 
    font-size: 13px; 
    font-weight: 700; 
    color: #60a5fa; 
    line-height: 1.2; 
} 
.im-trust-desc { 
    font-size: 11px; 
    color: #64748b; 
    margin-top: 4px; 
    line-height: 1.4; 
} 
.im-btn { 
    width: 100%; 
    padding: 14px; 
    border: none; 
    border-radius: 12px; 
    color: white; 
    font-weight: 700; 
    font-size: 15px; 
    cursor: pointer; 
    transition: all 0.2s; 
    box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); 
} 
.im-btn:hover { 
    transform: translateY(-2px); 
    box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); 
}
.im-timer-wrap { text-align: center; margin-bottom: 12px; }
.im-timer { display: inline-flex; align-items: center; justify-content: center; gap: 6px; font-weight: 700; font-size: 14px; color: #60a5fa; background: rgba(96, 165, 250, 0.1); padding: 8px 16px; border-radius: 99px; }
.im-error-modal { position: fixed; inset: 0; background: rgba(15,23,42,0.6); backdrop-filter: blur(4px); z-index: 999999; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; padding: 16px; }
.im-error-modal.im-show { opacity: 1; pointer-events: auto; }
.im-error-box { background: white; padding: 24px; border-radius: 20px; text-align: center; max-width: 320px; width: 100%; transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
.im-error-modal.im-show .im-error-box { transform: scale(1); }
.im-error-icon { width: 56px; height: 56px; background: #fee2e2; color: #e11d48; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
.im-error-title { font-size: 18px; font-weight: 800; color: #0f172a; margin-bottom: 8px; line-height: 1.2; }
.im-error-desc { font-size: 13px; color: #64748b; line-height: 1.5; margin-bottom: 24px; }
.im-error-btn { width: 100%; padding: 12px; background: #e11d48; color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: background 0.2s; font-size: 14px;}
.im-error-btn:hover { background: #be123c; }

</style>

    <form id="im-form" class="im-body" onsubmit="return false;">

                    </div>
                    <div class="im-error-title">Terjadi Kesalahan</div>

                </div>
            </div>
            
</div>


<script>

function calculateTotal() { 
    let currentPrice = 0; 
    let qty = 1; 
    
    const formEl = document.getElementById('im-form');
    if (!formEl) return 0;
    
    const fd = new FormData(formEl); 
    
    for (let [key, value] of fd.entries()) { 
        if(typeof value === 'string') { 
            const match = value.match(/=\s*(\d+)/); 
            if (match) {
                currentPrice = parseInt(match[1]); 
            }
        } 
    } 
    
    const numInputs = formEl.querySelectorAll('input[type="number"]'); 
    
    if (numInputs.length > 0) { 
        let parsedQty = parseInt(numInputs[0].value); 
        qty = (!isNaN(parsedQty) && parsedQty > 0) ? parsedQty : 0; 
    } 
    
    let total = currentPrice * qty; 
    
    const totalBox = document.getElementById('im-total-box'); 
    const totalVal = document.getElementById('im-total-value'); 
    
    if (totalBox && totalVal) {
        if (currentPrice > 0) { 
            totalBox.style.display = 'flex'; 
            totalVal.innerText = 'Rp ' + new Intl.NumberFormat('id-ID').format(total); 
        } else { 
            totalBox.style.display = 'none'; 
        } 
    }
    
    return total; 
} 

document.getElementById('im-form').addEventListener('input', calculateTotal); 
document.getElementById('im-form').addEventListener('change', calculateTotal); 
calculateTotal();


let timeInSecs = 15 * 60;
let timerInterval = setInterval(() => {
    if(timeInSecs <= 0) { clearInterval(timerInterval); return; }
    timeInSecs--;
    let m = Math.floor(timeInSecs / 60);
    let s = timeInSecs % 60;
    let display = document.getElementById('im-time-display');
    if(display) display.innerText = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}, 1000);


function validateWA(phoneStr) {
    let cleanPhone = phoneStr.replace(/[^0-9+]/g, '');
    if(cleanPhone.length < parseInt('10')) return false;
    const prefixes = "08, 62, +62".split(',').map(p => p.trim()).filter(p => p);
    for(let p of prefixes) {
        if(cleanPhone.startsWith(p)) return true;
    }
    return false;
}


let sessionLeadId = 'LD_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);

// Track Form View on Load
(function() {
    const sheetUrl = 'https://script.google.com/macros/s/AKfycbzJtkwRKHXq5YH_S4tspuzz5B3N_FdOKy1bT6Ovqcqn8m9tPQufedB6M85fzW1jMOpZ/exec';
    if(sheetUrl && sheetUrl.startsWith('http')) {
        fetch(sheetUrl + "?action=track_view&form_name=" + encodeURIComponent('Konsultasi Gratis 30 Menit'), {
            method: 'GET',
            mode: 'no-cors'
        });
    }
})();


let captureTimeout;
let lastCapturedData = '';
const formElCap = document.getElementById('im-form');
formElCap.addEventListener('input', function(e) {
    clearTimeout(captureTimeout);
    captureTimeout = setTimeout(() => {
        const fd = new FormData(formElCap);
        const telInput = formElCap.querySelector('input[type="tel"]');
        if (!telInput || !telInput.value) return;
        
        if (validateWA(telInput.value)) {
            let formObj = {}; 
            for (let [key, value] of fd.entries()) { 
                if (formObj[key]) formObj[key] += ', ' + value; 
                else formObj[key] = value; 
            } 
            
            let jsonData = {
                Waktu_Order: new Date().toLocaleString(),
                Nama_Form: 'Konsultasi Gratis 30 Menit',
                wa_target: '',
                Status_Pesanan: 'UNFINISHED',
                Lead_ID: sessionLeadId
            };
            for (let key in formObj) { jsonData[key] = formObj[key]; }
            
            let finalTotal = calculateTotal();
            if (finalTotal > 0) jsonData['Total_Tagihan'] = finalTotal;
            
            const currentDataStr = JSON.stringify(jsonData);
            if (currentDataStr !== lastCapturedData) {
                lastCapturedData = currentDataStr;
                fetch('https://script.google.com/macros/s/AKfycbzJtkwRKHXq5YH_S4tspuzz5B3N_FdOKy1bT6Ovqcqn8m9tPQufedB6M85fzW1jMOpZ/exec', {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {'Content-Type': 'application/json'},
                    body: currentDataStr
                });
            }
        }
    }, 1500);
});


document.getElementById('im-form').addEventListener('submit', function(e) { 
    e.preventDefault(); 
    
    const telInput = document.querySelector('#im-form input[type="tel"]');
    if(telInput && !validateWA(telInput.value)) {
        document.getElementById('im-error-modal').classList.add('im-show');
        return false;
    }
    
    const btn = document.getElementById('im-submit-btn'); 
    btn.innerText = 'Memproses...'; 
    btn.style.opacity = '0.7'; 
    btn.style.pointerEvents = 'none'; 
    
    const formData = new FormData(this); 
    let formObj = {}; 
    
    for (let [key, value] of formData.entries()) { 
        if (formObj[key]) {
            formObj[key] += ', ' + value; 
        } else {
            formObj[key] = value; 
        }
    } 
    
    let jsonData = { 
        Waktu_Order: new Date().toLocaleString(), 
        Nama_Form: 'Konsultasi Gratis 30 Menit', 
        wa_target: '',
        Status_Pesanan: 'SUBMITTED',
        Lead_ID: sessionLeadId
    }; 
    
    for (let key in formObj) { 
        jsonData[key] = formObj[key]; 
    } 
    
    let finalTotal = calculateTotal(); 
    if(finalTotal > 0) { 
        jsonData['Total_Tagihan'] = finalTotal; 
    } 
    
    const sheetUrl = 'https://script.google.com/macros/s/AKfycbzJtkwRKHXq5YH_S4tspuzz5B3N_FdOKy1bT6Ovqcqn8m9tPQufedB6M85fzW1jMOpZ/exec'; 
    
    // Tembak Tracking Pixel
    
    
    if(sheetUrl && sheetUrl.startsWith('http')) { 
        fetch(sheetUrl, { 
            method: 'POST', 
            mode: 'no-cors', 
            headers: {'Content-Type': 'application/json'}, 
            body: JSON.stringify(jsonData) 
        }).then(() => { 
            btn.innerText = 'Terkirim ✓'; 
            btn.style.background = '#10b981'; 
            btn.style.color = '#fff';
        }).catch((err) => { 
            console.error(err);
            btn.innerText = 'Terkirim ✓'; 
            btn.style.background = '#10b981'; 
            btn.style.color = '#fff';
        }); 
        
        setTimeout(() => { 
            if(btn.innerText === 'Memproses...') { 
                btn.innerText = 'Terkirim ✓'; 
                btn.style.background = '#10b981'; 
                btn.style.color = '#fff';
            } 
        }, 3500); 
    } else { 
        btn.innerText = 'Terkirim ✓'; 
        btn.style.background = '#10b981'; 
        btn.style.color = '#fff';
    } 
});
</script>
